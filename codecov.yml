codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: 40...90
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

ignore:
  - "**/tests/**"
  - "**/qmltests.cpp"
  - "**/moc_*.cpp"
  - "**/qrc_*.cpp"
