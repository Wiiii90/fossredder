name: Feature request
description: Propose a new feature, workflow improvement, or product change
title: "[Feature]: "
labels:
  - feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose a feature.
        Please provide enough context so the scope and acceptance criteria are clear.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: Describe the user pain point or missing capability.
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should the outcome be?
      placeholder: Describe the intended result in concrete terms.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and what is intentionally out of scope?
      placeholder: List the expected boundaries of this issue.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List the conditions that must be true for this issue to be considered done.
      placeholder: |
        - [ ] ...
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add links, screenshots, related issues, or implementation hints.
      placeholder: Optional context, references, or constraints.
