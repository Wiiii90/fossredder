name: Bug report
description: Report a reproducible defect, regression, or broken behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please include reproducible steps and the expected versus actual behavior.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the bug in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: How can the issue be reproduced?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should have happened instead?
      placeholder: Describe the intended outcome.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happened instead?
      placeholder: Describe the observed outcome.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Where did the issue happen?
      placeholder: "Example: Windows 10, Release build, current develop branch"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste relevant logs, stack traces, or error messages here.
      placeholder: Optional logs or error output.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add screenshots, links, or any other context that helps debugging.
      placeholder: Optional context, links, or observations.
