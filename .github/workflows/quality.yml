name: quality

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure vcpkg paths
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          $vcpkgCache = Join-Path $env:RUNNER_TEMP "vcpkg-binary-cache"
          New-Item -ItemType Directory -Force -Path $vcpkgRoot, $vcpkgCache | Out-Null
          "VCPKG_ROOT=$vcpkgRoot" | Set-Content -Path $env:GITHUB_ENV -Encoding utf8
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgCache" | Add-Content -Path $env:GITHUB_ENV -Encoding utf8

      - name: Configure MSVC environment
        run: |
          $vsWhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vsWhere)) {
            throw "vswhere.exe not found at $vsWhere"
          }

          $vsInstallPath = & $vsWhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstallPath)) {
            throw "Visual Studio installation not found"
          }

          $vsDevCmd = Join-Path $vsInstallPath "Common7\Tools\VsDevCmd.bat"
          if (!(Test-Path $vsDevCmd)) {
            throw "VsDevCmd.bat not found at $vsDevCmd"
          }

          $envDump = & cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($line in $envDump) {
            $equalsIndex = $line.IndexOf('=')
            if ($equalsIndex -le 0) {
              continue
            }

            $name = $line.Substring(0, $equalsIndex)
            $value = $line.Substring($equalsIndex + 1)
            if ($name -in @('PROMPT', '__VSCMD_PREINIT_PATH')) {
              continue
            }

            "$name=$value" | Add-Content -Path $env:GITHUB_ENV -Encoding utf8
          }

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Configure CI preset
        run: cmake --preset ci

      - name: Build CI preset
        run: cmake --build --preset release-ci --parallel

      - name: Run test preset
        run: ctest --preset release-ci

  clang-tidy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure vcpkg paths
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          $vcpkgCache = Join-Path $env:RUNNER_TEMP "vcpkg-binary-cache"
          New-Item -ItemType Directory -Force -Path $vcpkgRoot, $vcpkgCache | Out-Null
          "VCPKG_ROOT=$vcpkgRoot" | Set-Content -Path $env:GITHUB_ENV -Encoding utf8
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgCache" | Add-Content -Path $env:GITHUB_ENV -Encoding utf8

      - name: Configure MSVC environment
        run: |
          $vsWhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vsWhere)) {
            throw "vswhere.exe not found at $vsWhere"
          }

          $vsInstallPath = & $vsWhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstallPath)) {
            throw "Visual Studio installation not found"
          }

          $vsDevCmd = Join-Path $vsInstallPath "Common7\Tools\VsDevCmd.bat"
          if (!(Test-Path $vsDevCmd)) {
            throw "VsDevCmd.bat not found at $vsDevCmd"
          }

          $envDump = & cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($line in $envDump) {
            $equalsIndex = $line.IndexOf('=')
            if ($equalsIndex -le 0) {
              continue
            }

            $name = $line.Substring(0, $equalsIndex)
            $value = $line.Substring($equalsIndex + 1)
            if ($name -in @('PROMPT', '__VSCMD_PREINIT_PATH')) {
              continue
            }

            "$name=$value" | Add-Content -Path $env:GITHUB_ENV -Encoding utf8
          }

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Configure tidy preset
        run: cmake --preset tidy

      - name: Build tidy preset
        run: cmake --build --preset release-tidy --parallel

  coverage:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure vcpkg paths
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          $vcpkgCache = Join-Path $env:RUNNER_TEMP "vcpkg-binary-cache"
          New-Item -ItemType Directory -Force -Path $vcpkgRoot, $vcpkgCache | Out-Null
          "VCPKG_ROOT=$vcpkgRoot" | Set-Content -Path $env:GITHUB_ENV -Encoding utf8
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgCache" | Add-Content -Path $env:GITHUB_ENV -Encoding utf8

      - name: Configure MSVC environment
        run: |
          $vsWhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vsWhere)) {
            throw "vswhere.exe not found at $vsWhere"
          }

          $vsInstallPath = & $vsWhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstallPath)) {
            throw "Visual Studio installation not found"
          }

          $vsDevCmd = Join-Path $vsInstallPath "Common7\Tools\VsDevCmd.bat"
          if (!(Test-Path $vsDevCmd)) {
            throw "VsDevCmd.bat not found at $vsDevCmd"
          }

          $envDump = & cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 -no_logo && set"
          foreach ($line in $envDump) {
            $equalsIndex = $line.IndexOf('=')
            if ($equalsIndex -le 0) {
              continue
            }

            $name = $line.Substring(0, $equalsIndex)
            $value = $line.Substring($equalsIndex + 1)
            if ($name -in @('PROMPT', '__VSCMD_PREINIT_PATH')) {
              continue
            }

            "$name=$value" | Add-Content -Path $env:GITHUB_ENV -Encoding utf8
          }

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Configure coverage preset
        run: cmake --preset coverage

      - name: Build coverage preset
        run: cmake --build --preset release-coverage --parallel

      - name: Collect LLVM coverage
        run: .\ci\coverage-windows.ps1 -BuildDir .build\coverage -Config Release -OutDir coverage

      - name: Publish coverage summary
        run: Get-Content .\coverage\coverage-summary.txt | Out-String | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: error

      - name: Upload Codecov report
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage/coverage.lcov
          fail_ci_if_error: false
          verbose: true
