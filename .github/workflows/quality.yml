          if (Test-Path $vcpkgRoot) {
            Remove-Item -Path $vcpkgRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $vcpkgCache | Out-Null
          "VCPKG_ROOT=$vcpkgRoot" | Set-Content -Path $env:GITHUB_ENV -Encoding utf8
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgCache" | Add-Content -Path $env:GITHUB_ENV -Encoding utf8

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Configure tidy preset
        run: cmake --preset github-tidy

      - name: Build tidy preset
        run: cmake --build --preset release-github-tidy --parallel

  coverage:
