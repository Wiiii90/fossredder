name: quality

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  build-and-test:
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare staging dir
        run: |
          $staging = Join-Path $PWD ".build\ci\staging\${{ github.run_id }}"
          if (Test-Path $staging) { Remove-Item -Path $staging -Recurse -Force }
          New-Item -ItemType Directory -Path $staging | Out-Null
          icacls $staging /grant "NT AUTHORITY\SYSTEM:(OI)(CI)F" /T | Out-Null
          echo "TARGET_DIR=$staging" >> $env:GITHUB_ENV

      - name: Prepare staging dir
        run: |
          $staging = Join-Path $PWD ".build\ci\staging\${{ github.run_id }}"
          if (Test-Path $staging) { Remove-Item -Path $staging -Recurse -Force }
          New-Item -ItemType Directory -Path $staging | Out-Null
          icacls $staging /grant "NT AUTHORITY\SYSTEM:(OI)(CI)F" /T | Out-Null
          echo "TARGET_DIR=$staging" >> $env:GITHUB_ENV

      - name: Prepare staging dir
        run: |
          $staging = Join-Path $PWD ".build\ci\staging\${{ github.run_id }}"
          if (Test-Path $staging) { Remove-Item -Path $staging -Recurse -Force }
          New-Item -ItemType Directory -Path $staging | Out-Null
          # Ensure runner service account can write
          icacls $staging /grant "NT AUTHORITY\SYSTEM:(OI)(CI)F" /T | Out-Null
          echo "TARGET_DIR=$staging" >> $env:GITHUB_ENV

      - name: Clean previous build
        run: |
          if (Test-Path .build) { Remove-Item -Path .build -Recurse -Force }

      - name: Validate runner prerequisites
        run: .\ci\assert-quality-runner.ps1

      - name: Configure CI preset
        run: cmake --preset ci

      - name: Build CI preset
        run: cmake --build --preset release-ci --parallel

      - name: Run test preset
        run: ctest --preset release-ci

  clang-tidy:
    runs-on:
      - self-hosted
      - Windows
      - X64
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean previous build
        run: |
          if (Test-Path .build) { Remove-Item -Path .build -Recurse -Force }

      - name: Validate runner prerequisites
        run: .\ci\assert-quality-runner.ps1 -RequireClangTidy

      - name: Configure tidy preset
        run: cmake --preset tidy

      - name: Build tidy preset
        run: cmake --build --preset release-tidy --parallel

  coverage:
    runs-on:
      - self-hosted
      - Windows
      - X64
    needs: build-and-test
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean previous build
        run: |
          if (Test-Path .build) { Remove-Item -Path .build -Recurse -Force }

      - name: Validate runner prerequisites
        run: .\ci\assert-quality-runner.ps1 -RequireCoverageTools

      - name: Configure coverage preset
        run: cmake --preset coverage

      - name: Build coverage preset
        run: cmake --build --preset release-coverage --parallel

      - name: Collect LLVM coverage
        run: .\ci\coverage-windows.ps1 -BuildDir .build\coverage -Config Release -OutDir coverage

      - name: Publish coverage summary
        run: Get-Content .\coverage\coverage-summary.txt | Out-String | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: error

      - name: Upload Codecov report
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage/coverage.lcov
          fail_ci_if_error: false
          verbose: true
