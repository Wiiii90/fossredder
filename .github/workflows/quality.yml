name: quality

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: pwsh

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install CMake 4
        run: |
          python -m pip install --disable-pip-version-check cmake==4.2.3 ninja
          $cmakeScripts = python -c "import sysconfig; print(sysconfig.get_path('scripts'))"
          $cmakeScripts | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Configure MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure vcpkg paths
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          $vcpkgCache = Join-Path $env:RUNNER_TEMP "vcpkg-binary-cache"
          if (Test-Path $vcpkgRoot) {
            Remove-Item -Path $vcpkgRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $vcpkgCache | Out-Null
          "VCPKG_ROOT=$vcpkgRoot" | Set-Content -Path $env:GITHUB_ENV -Encoding utf8
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgCache" | Add-Content -Path $env:GITHUB_ENV -Encoding utf8

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Configure CI preset
        run: cmake --preset github-ci

      - name: Build CI preset
        run: cmake --build --preset release-github-ci --parallel

      - name: Run test preset
        run: ctest --preset release-github-ci

  clang-tidy:
