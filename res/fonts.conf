<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <dir prefix="cwd">./res/fonts</dir>
    <alias>
        <family>ArialUnicode</family>
        <prefer>
            <family>Arial Unicode MS</family>
        </prefer>
    </alias>
    <alias>
        <family>Symbol</family>
        <prefer>
            <family>Symbol</family>
        </prefer>
    </alias>
</fontconfig>
